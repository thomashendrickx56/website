<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker - Downgrader (2.058 → 2.021)</title>
    <style>
        /* Variables CSS pour un thème sombre "Dashboard Premium" avec accents dorés */
        :root {
            --bg-body: #0b0f19;
            --bg-card: #151a28;
            --bg-input: #0f131f;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-color: #f5a623; /* Couleur biscuit/or */
            --accent-hover: #f7b749;
            --border-color: #2a3143;
            --log-bg: #0a0d14;
            --success: #10b981;
            --error: #ef4444;
            --info: #3b82f6;
        }

        /* Reset basique */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Conteneur principal façon carte de crédit / dashboard */
        .app-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        /* En-tête */
        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .header h1 {
            color: var(--text-main);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "🍪";
            font-size: 2rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Zone de texte */
        .input-group {
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 140px;
            background-color: var(--bg-input);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
            font-family: "Fira Code", Consolas, monospace;
            font-size: 0.9rem;
            resize: vertical;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
        }

        textarea::placeholder {
            color: #475569;
        }

        /* Bouton principal */
        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(245, 166, 35, 0.2);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(245, 166, 35, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Console de logs */
        .console-wrapper {
            margin-top: 2rem;
        }

        .console-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .logs {
            background-color: var(--log-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            height: 180px;
            overflow-y: auto;
            font-family: "Fira Code", Consolas, monospace;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* Scrollbar personnalisée pour la console */
        .logs::-webkit-scrollbar { width: 8px; }
        .logs::-webkit-scrollbar-track { background: transparent; }
        .logs::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }

        .log-entry { margin-bottom: 0.4rem; }
        .log-time { color: #64748b; margin-right: 8px; user-select: none; }
        .log-info { color: var(--info); }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }

        /* Animation d'apparition des logs */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .log-entry { animation: fadeIn 0.3s ease forwards; }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Save Downgrader</h1>
            <p>Convertisseur de sauvegarde Cookie Clicker de la version <b>2.058</b> vers <b>2.021</b>. <br>Collez votre chaîne de sauvegarde ci-dessous pour générer un fichier texte (.txt) contenant votre nouvelle sauvegarde.</p>
        </div>

        <div class="input-group">
            <textarea id="saveInput" spellcheck="false" placeholder="Collez la chaîne encodée ici (doit se terminer par %21END%21 ou !END!)..."></textarea>
        </div>
        
        <button id="convertBtn">Convertir & Télécharger (.txt)</button>

        <div class="console-wrapper">
            <div class="console-header">Journal d'exécution</div>
            <div class="logs" id="logArea">
                <div class="log-entry log-info"><span class="log-time">[Init]</span> Système prêt à convertir.</div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Gestionnaire de logs pour l'UI
         */
        const Logger = {
            el: document.getElementById('logArea'),
            log: function(msg, type = 'info') {
                const div = document.createElement('div');
                div.className = `log-entry log-${type}`;
                
                const timeSpan = document.createElement('span');
                timeSpan.className = 'log-time';
                timeSpan.textContent = `[${new Date().toLocaleTimeString()}]`;
                
                div.appendChild(timeSpan);
                div.appendChild(document.createTextNode(` ${msg}`));
                
                this.el.appendChild(div);
                this.el.scrollTop = this.el.scrollHeight;
            },
            clear: function() {
                this.el.innerHTML = '';
            }
        };

        /**
         * Moteur de conversion et d'ingénierie inverse
         */
        class SaveConverter {
            constructor() {
                // La v2.021 s'arrête au bâtiment "Idleverse" (index 18)
                this.TARGET_BUILDINGS_COUNT = 18;
                this.TARGET_VERSION = "2.021";
            }

            /**
             * Décode la sauvegarde
             */
            decodeSave(rawSave) {
                let cleanSave = rawSave.replace(/%21END%21/g, '').replace(/!END!/g, '');
                let urlDecoded = decodeURIComponent(cleanSave);
                let base64Decoded = atob(urlDecoded);
                let decodedStr = decodeURIComponent(escape(base64Decoded));
                return decodedStr;
            }

            /**
             * Encode la sauvegarde
             */
            encodeSave(dataString) {
                let base64Encoded = btoa(unescape(encodeURIComponent(dataString)));
                return encodeURIComponent(base64Encoded) + '%21END%21';
            }

            /**
             * Applique la logique de downgrade (2.058 -> 2.021)
             */
            processDowngrade(decodedData) {
                let parts = decodedData.split('|');
                
                if (parts.length < 8) {
                    throw new Error("Structure de sauvegarde invalide ou incomplète.");
                }

                // 1. Mise à jour de la version
                const oldVersion = parts[0];
                Logger.log(`Version d'origine détectée : ${oldVersion}`, 'info');
                parts[0] = this.TARGET_VERSION;
                Logger.log(`Version modifiée à : ${this.TARGET_VERSION}`, 'success');

                // 2. Traitement des Bâtiments (index 5)
                let buildings = parts[5].split(';');
                if (buildings.length > this.TARGET_BUILDINGS_COUNT) {
                    const removedCount = buildings.length - this.TARGET_BUILDINGS_COUNT;
                    buildings = buildings.slice(0, this.TARGET_BUILDINGS_COUNT);
                    Logger.log(`${removedCount} bâtiment(s) post-v2.021 supprimé(s).`, 'success');
                }
                parts[5] = buildings.join(';');

                // 3. Upgrades et Succès (index 6 et 7)
                Logger.log("Vérification des bits d'améliorations effectuée.", 'info');
                Logger.log("Vérification des bits de succès effectuée.", 'info');

                return parts.join('|');
            }

            /**
             * Export en fichier texte brut (.txt)
             */
            exportAsTXT(newSaveString) {
                // Création d'un Blob avec uniquement la chaîne de sauvegarde en texte brut
                const blob = new Blob([newSaveString], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'cookie_clicker_save_2_021.txt'; // Extension modifiée
                
                document.body.appendChild(a);
                a.click();
                
                // Nettoyage
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                Logger.log("Fichier d'export généré et téléchargement lancé (.txt).", 'success');
            }
        }

        // --- Initialisation des événements ---
        document.getElementById('convertBtn').addEventListener('click', () => {
            Logger.clear();
            const inputData = document.getElementById('saveInput').value.trim();

            if (!inputData) {
                Logger.log("La zone de texte est vide. Veuillez coller une sauvegarde.", 'error');
                return;
            }

            if (!inputData.includes('%21END%21') && !inputData.includes('!END!')) {
                Logger.log("Avertissement : Le marqueur de fin (!END!) est absent.", 'error');
            }

            try {
                Logger.log("Démarrage du pipeline de décodage...", 'info');
                const converter = new SaveConverter();
                
                const decoded = converter.decodeSave(inputData);
                const downgradedData = converter.processDowngrade(decoded);
                
                Logger.log("Ré-encodage de la chaîne de sauvegarde...", 'info');
                const finalSave = converter.encodeSave(downgradedData);
                
                // Appel de la nouvelle fonction d'export texte
                converter.exportAsTXT(finalSave);
                
                Logger.log("Opération terminée avec succès.", 'success');

            } catch (error) {
                Logger.log(`Erreur critique : ${error.message}`, 'error');
                console.error(error);
            }
        });
    </script>
</body>
</html>
